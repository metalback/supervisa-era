<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased">

<header class="w-full top-0 sticky z-40 bg-surface border-b border-outline-variant flex items-center justify-between px-container-padding h-14 transition-colors duration-200">
<button class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile text-primary">Supervisión de Salud</h1>
<button class="text-primary hover:bg-surface-container-low p-2 rounded-full transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="cloud_done">cloud_done</span>
</button>
</header>
<!-- Main Content Canvas -->

<!-- Header Section -->
<section class="flex flex-col gap-base">
<h2 class="font-headline-md text-headline-md text-on-surface">Indicadores de Resultado</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Pre-carga de datos estadísticos del establecimiento.</p>
<div class="bg-surface-container-low border border-outline-variant rounded-lg p-container-padding flex items-start gap-3 mt-2">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
<p class="font-body-md text-body-md text-on-surface">La tasa será calculada automáticamente en la planilla Excel final.</p>
</div>
</section>
<!-- Asma Block -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-container-padding flex flex-col gap-stack-gap">
<div class="flex items-center gap-2 border-b border-outline-variant pb-2">
<span class="material-symbols-outlined text-secondary" data-icon="pulmonology">pulmonology</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Asma</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap mt-2">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="asma-num">Numerador</label>
<input class="border border-outline-variant rounded-DEFAULT px-3 py-2 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-surface-container-lowest" id="asma-num" placeholder="0" type="number"/>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="asma-den">Denominador</label>
<input class="border border-outline-variant rounded-DEFAULT px-3 py-2 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors bg-surface-container-lowest" id="asma-den" placeholder="0" type="number"/>
</div>
</div>
</section>
<!-- EPOC Block -->

<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="epoc-den">Denominador</label>

</div>
</div>
</section>

<label class="font-label-md text-label-md text-on-surface-variant" for="cob-den">Denominador</label>

<span class="font-label-md text-label-md mt-1">Resultados</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-container-high transition-transform scale-95 active:scale-90 rounded-full">

<span class="font-label-md text-label-md mt-1">Soporte</span>

<button class="text-on-surface-variant font-headline-sm text-headline-sm h-full border-b-2 border-transparent hover:text-primary transition-colors">Estructura</button>
<button class="text-on-surface-variant font-headline-sm text-headline-sm h-full border-b-2 border-transparent hover:text-primary transition-colors">Procesos</button>

<button class="text-on-surface-variant font-headline-sm text-headline-sm h-full border-b-2 border-transparent hover:text-primary transition-colors">Soporte</button>
<button class="text-on-surface-variant font-headline-sm text-headline-sm h-full border-b-2 border-transparent hover:text-primary transition-colors">Cierre</button>
